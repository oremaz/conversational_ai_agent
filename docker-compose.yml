services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"   # Streamlit UI
      - "8000:8000"   # FastAPI (if running)
    env_file:
      - path: .env
        required: false
    volumes:
      - chat_data:/app/.chat_sessions
      - chroma_data:/app/chroma_db
    restart: unless-stopped

  # Uncomment for GPU support:
